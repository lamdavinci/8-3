<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8/3 cho người đặc biệt</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #fff5f7, #ffdde1); font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff0f3; display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; color: #d81b60; font-size: 1.2em;
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #d81b60; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #ui { 
            position: absolute; 
            top: 65%; 
            left: 50%; 
            transform: translateX(-50%); 
            text-align: center; 
            pointer-events: none; 
            z-index: 100; 
            width: 90%; 
            max-width: 450px; 
        }
        
        .message-card { 
            background: none; 
            backdrop-filter: none; 
            -webkit-backdrop-filter: none;
            border: none;
            padding: 20px; 
            display: none;
            box-shadow: none; 
            opacity: 0;
        }

        .title-span { 
            color: #d81b60; 
            font-size: 1.7em; 
            font-weight: bold; 
            display: block; 
            margin-bottom: 10px; 
            text-shadow: 0 0 10px white, 0 0 5px white; 
        }
        .content-span { 
            color: #1a1a1a; 
            font-size: 1.1em; 
            line-height: 1.5; 
            font-weight: 600; 
            display: block; 
            text-shadow: 0 0 8px white, 0 0 4px white; 
        }

        .hint { position: absolute; bottom: 25px; width: 100%; text-align: center; color: #d81b60; font-weight: bold; pointer-events: none; font-size: 0.9em; z-index: 10; text-shadow: 0 0 10px white; }
    </style>
</head>
<body>
    <audio id="bgMusic" loop>
        <source src="nhac.mp3" type="audio/mpeg">
    </audio>

    <div id="loader"><div class="spinner"></div>Chuẩn bị nhé...</div>
    
    <div id="ui">
        <div class="message-card" id="card">
            <p id="text"></p>
        </div>
    </div>
    
    <div class="hint" id="hint-text">CHẠM VÀO PHONG THƯ CÓ ĐIỀU BẤT NGỜ</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, controls, bouquetModel, envelope, particleSystem, clock;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        init();
        animate();

        function init() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xfff5f7);
            scene.fog = new THREE.Fog(0xfff5f7, 10, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 15, 10);
            scene.add(light);

            const loader = new THREE.GLTFLoader();
            loader.load('bouquet.glb', function (gltf) {
                bouquetModel = gltf.scene;
                if (bouquetModel) {
                    const box = new THREE.Box3().setFromObject(bouquetModel);
                    const size = box.getSize(new THREE.Vector3());
                    const scale = 8 / Math.max(size.x, size.y, size.z);
                    bouquetModel.scale.set(scale, scale, scale);
                    bouquetModel.position.set(0, -1, 0);
                    scene.add(bouquetModel);
                    gsap.from(bouquetModel.position, { y: -10, duration: 1.5, ease: "back.out(1.2)" });
                    setTimeout(createDetailed3DEnvelope, 1000);
                }
                document.getElementById('loader').style.display = 'none';
            }, undefined, (error) => {
                console.error("Lỗi tải model hoa:", error);
                document.getElementById('loader').innerText = "Lỗi: Không tìm thấy file bouquet.glb!";
            });

            createPinkPetalSystem();
            window.addEventListener('click', onPointerClick);
            window.addEventListener('touchstart', onPointerClick, { passive: false });
        }

        function createPinkPetalSystem() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ff4d6d';
            ctx.beginPath();
            ctx.ellipse(32, 32, 25, 15, Math.PI / 4, 0, Math.PI * 2);
            ctx.fill();
            const petalTexture = new THREE.CanvasTexture(canvas);
            const petalCount = 450;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(petalCount * 3);
            const velocities = new Float32Array(petalCount * 3);
            for (let i = 0; i < petalCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 40;
                positions[i * 3 + 1] = Math.random() * 20;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 40;
                velocities[i * 3 + 1] = -(Math.random() * 0.05 + 0.02);
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('velocity', new THREE.BufferAttribute(velocities, 3));
            const material = new THREE.PointsMaterial({
                size: 0.4, map: petalTexture, transparent: true, opacity: 0.9, depthTest: false, blending: THREE.NormalBlending, sizeAttenuation: true
            });
            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
        }

        function createDetailed3DEnvelope() {
            envelope = new THREE.Group();
            const bodyGeo = new THREE.ExtrudeGeometry(new THREE.Shape().moveTo(-1.8, -1.2).lineTo(1.8, -1.2).lineTo(1.8, 1.2).lineTo(-1.8, 1.2), { depth: 0.2, bevelEnabled: true, bevelThickness: 0.05 });
            const body = new THREE.Mesh(bodyGeo, new THREE.MeshPhongMaterial({ color: 0xff4d6d }));
            body.position.z = -0.1;
            envelope.add(body);
            const flapGeo = new THREE.ExtrudeGeometry(new THREE.Shape().moveTo(-1.8, 0).lineTo(1.8, 0).lineTo(0, 1.3), { depth: 0.08, bevelEnabled: false });
            const flapPivot = new THREE.Group();
            flapPivot.position.set(0, 1.2, 0.1);
            flapPivot.add(new THREE.Mesh(flapGeo, new THREE.MeshPhongMaterial({ color: 0xff758f })));
            envelope.add(flapPivot);
            envelope.flapPivot = flapPivot;
            const seal = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.04, 16, 32), new THREE.MeshPhongMaterial({color: 0xffd700}));
            seal.position.set(0, 0.7, 0.2);
            seal.rotation.x = Math.PI / 2;
            envelope.add(seal);
            envelope.position.set(0, -4.2, 4);
            envelope.rotation.x = -Math.PI / 10;
            scene.add(envelope);
            gsap.to(envelope.position, { z: 2, duration: 1 });
        }

        function onPointerClick(e) {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        mouse.x = (clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        if (envelope) {
            const intersects = raycaster.intersectObjects(envelope.children, true);
            if (intersects.length > 0) {
                const music = document.getElementById('bgMusic');
                if(music) music.play();
                
                gsap.to(envelope.flapPivot.rotation, { x: Math.PI * 0.8, duration: 0.8 });
                gsap.to(envelope.position, { y: -15, duration: 1.2, delay: 0.4, onComplete: () => {
                    scene.remove(envelope);
                    envelope = null;
                }});
                showCard();
            }
        }
    }

        function showCard() {
            const card = document.getElementById('card');
            card.style.display = 'block';
            gsap.to(card, { opacity: 1, duration: 0.8 });
            document.getElementById('hint-text').innerText = "Anh nhớ em...";
            
            typeEffect(
                "Chúc Chi 8/3 vui vẻ! 🌸", 
                "Happy International Women's Day! Chúc em luôn xinh đẹp, tự tin và tỏa sáng như đóa hoa này. Hãy luôn hạnh phúc nhé!. Dù có ra sao, hãy yêu thương chính mình thật nhiều nhé!"
            );
        }

        function typeEffect(titleText, contentText) {
            let i = 0;
            const el = document.getElementById('text'); 
            el.innerHTML = "";
            
            const titleSpan = document.createElement('span');
            titleSpan.className = 'title-span';
            titleSpan.innerHTML = titleText; 
            el.appendChild(titleSpan);

            const contentSpan = document.createElement('span');
            contentSpan.className = 'content-span';
            el.appendChild(contentSpan);

            const timer = setInterval(() => {
                if(i < contentText.length) { 
                    contentSpan.innerHTML += contentText.charAt(i);
                    i++; 
                }
                else clearInterval(timer);
            }, 120);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            const d = clock.getElapsedTime();
            if(envelope) envelope.position.y += Math.sin(d * 4) * 0.002;
            if (particleSystem) {
                const positions = particleSystem.geometry.attributes.position.array;
                const velocities = particleSystem.geometry.attributes.velocity.array;
                for (let i = 0; i < positions.length / 3; i++) {
                    positions[i * 3 + 1] += velocities[i * 3 + 1];
                    positions[i * 3] += Math.sin(d + i) * 0.01;
                    if (positions[i * 3 + 1] < -10) {
                        positions[i * 3 + 1] = 15;
                        positions[i * 3] = (Math.random() - 0.5) * 40;
                    }
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
            }
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
